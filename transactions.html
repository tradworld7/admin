<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trade World - Transaction Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* (Include all CSS styles from dashboard.html here) */
        /* ... */
    </style>
</head>
<body>
    <!-- (Include header and sidebar from dashboard.html) -->
    <!-- ... -->

    <main class="main-content" id="mainContent">
        <div class="section-header">
            <h1 class="page-title">Transaction Management</h1>
            <div class="transaction-filters">
                <select id="transactionTypeFilter">
                    <option value="all">All Types</option>
                    <option value="deposit">Deposits</option>
                    <option value="withdrawal">Withdrawals</option>
                    <option value="transfer">Transfers</option>
                </select>
                <select id="transactionStatusFilter">
                    <option value="all">All Statuses</option>
                    <option value="pending">Pending</option>
                    <option value="completed">Completed</option>
                </select>
                <button id="applyFiltersBtn" class="btn btn-primary">
                    <i class="fas fa-filter"></i> Apply
                </button>
            </div>
        </div>
        
        <div class="transaction-actions">
            <button id="exportTransactionsBtn" class="btn btn-info">
                <i class="fas fa-file-export"></i> Export
            </button>
        </div>
        
        <div class="table-responsive">
            <table class="table transactions-table">
                <thead>
                    <tr>
                        <th>Transaction ID</th>
                        <th>User</th>
                        <th>Type</th>
                        <th>Amount</th>
                        <th>Date</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="transactionsTableBody">
                    <tr>
                        <td colspan="7" class="text-center">Loading transactions...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script>
        // (Include all JavaScript from dashboard.html here)
        // ...

        function loadTransactions() {
            const typeFilter = document.getElementById('transactionTypeFilter').value;
            const statusFilter = document.getElementById('transactionStatusFilter').value;
            
            let query = database.ref('transactions').orderByChild('timestamp');
            
            if (statusFilter !== 'all') {
                query = query.orderByChild('status').equalTo(statusFilter);
            }
            
            query.once('value').then(snapshot => {
                const tbody = document.getElementById('transactionsTableBody');
                tbody.innerHTML = '';
                
                if (!snapshot.exists()) {
                    tbody.innerHTML = '<tr><td colspan="7">No transactions found</td></tr>';
                    return;
                }

                snapshot.forEach(child => {
                    const tx = child.val();
                    if (typeFilter !== 'all' && tx.type !== typeFilter) return;
                    
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td>${child.key.substring(0, 8)}...</td>
                        <td>${tx.userId || 'System'}</td>
                        <td>${tx.type}</td>
                        <td>$${(tx.amount || 0).toFixed(2)}</td>
                        <td>${formatDate(tx.timestamp)}</td>
                        <td class="status-${tx.status || 'completed'}">${tx.status || 'completed'}</td>
                        <td>
                            <button class="btn btn-sm btn-primary view-tx" data-txid="${child.key}">
                                <i class="fas fa-eye"></i> View
                            </button>
                        </td>
                    `;
                    tbody.appendChild(row);
                });
            });
        }

        // Initialize the page
        document.addEventListener('DOMContentLoaded', function() {
            if (!checkAdminAuth()) return;
            
            document.getElementById('adminName').textContent = ADMIN_CREDENTIALS.userId;
            
            // Load transactions
            loadTransactions();
            
            // Apply filters
            document.getElementById('applyFiltersBtn').addEventListener('click', loadTransactions);
            
            // Export transactions
            document.getElementById('exportTransactionsBtn').addEventListener('click', exportTransactions);
            
            // Logout
            document.querySelectorAll('#logoutBtn, #logoutLink').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.preventDefault();
                    localStorage.removeItem('adminAuthenticated');
                    window.location.href = 'index.html';
                });
            });
        });

        function exportTransactions() {
            // Implementation for exporting transactions to CSV
            // ...
        }
    </script>
</body>
</html>
