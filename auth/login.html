<!DOCTYPE html>
<html lang="en">
<head>
    <!-- पिछले जैसा हेड सेक्शन रखें -->
    <!-- ... (वही CSS और मेटा टैग) ... -->
</head>
<body>
    <!-- पिछले जैसा HTML बॉडी रखें -->
    <!-- ... (वही लॉगिन फॉर्म) ... -->

    <!-- Firebase और लॉगिन स्क्रिप्ट -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script>
        // Firebase कॉन्फिगरेशन
        const firebaseConfig = {
            apiKey: "AIzaSyBshAGZScyo7PJegLHMzORbkkrCLGD6U5s",
            authDomain: "mywebsite-600d3.firebaseapp.com",
            databaseURL: "https://mywebsite-600d3-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "mywebsite-600d3",
            storageBucket: "mywebsite-600d3.appspot.com",
            messagingSenderId: "584485288598",
            appId: "1:584485288598:web:01856eaa18ba5ada49e0b7",
            measurementId: "G-GQ9J9QH42J"
        };

        // Firebase इनिशियलाइज़ करें
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }

        const auth = firebase.auth();

        // लॉगिन फॉर्म सबमिशन
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const errorElement = document.getElementById('loginError');
            const loginBtnText = document.getElementById('loginBtnText');
            const loginSpinner = document.getElementById('loginSpinner');
            
            // लोडिंग स्टेट सेट करें
            loginBtnText.textContent = "Logging in...";
            loginSpinner.style.display = "inline-block";
            errorElement.textContent = "";

            // Firebase Authentication का उपयोग करें
            auth.signInWithEmailAndPassword(email, password)
                .then((userCredential) => {
                    // चेक करें कि यूजर admin है
                    if(userCredential.user.email === "rkv858810@gmail.com") {
                        localStorage.setItem('adminAuthenticated', 'true');
                        localStorage.setItem('adminEmail', userCredential.user.email);
                        window.location.href = "../index.html";
                    } else {
                        throw new Error("Access denied. Admin privileges required.");
                    }
                })
                .catch((error) => {
                    // एरर हैंडलिंग
                    console.error("Login error:", error);
                    loginBtnText.textContent = "Login";
                    loginSpinner.style.display = "none";
                    
                    if (error.code === 'auth/wrong-password' || error.code === 'auth/user-not-found') {
                        errorElement.textContent = "Invalid email or password";
                    } else {
                        errorElement.textContent = error.message || "Login failed. Please try again.";
                    }
                });
        });

        // पासवर्ड रीसेट फंक्शन (ऑप्शनल)
        function resetPassword() {
            const email = prompt("Please enter your email address:");
            if (email) {
                auth.sendPasswordResetEmail(email)
                    .then(() => {
                        alert("Password reset email sent!");
                    })
                    .catch((error) => {
                        alert("Error sending reset email: " + error.message);
                    });
            }
        }
    </script>
</body>
</html>
