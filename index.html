<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trade World - Admin Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root {
            --primary-color: #4361ee;
            --secondary-color: #3f37c9;
            --danger-color: #f72585;
            --white-color: #ffffff;
            --dark-color: #212529;
            --gray-color: #6c757d;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: #f5f7fa;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 1rem;
        }

        .auth-container {
            width: 100%;
            max-width: 450px;
            padding: 0 15px;
        }

        .auth-card {
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .auth-header {
            padding: 1.5rem;
            text-align: center;
            background-color: var(--primary-color);
            color: white;
        }

        .auth-header .logo-icon {
            font-size: 2rem;
            margin-bottom: 0.75rem;
        }

        .auth-header h1 {
            margin: 0;
            font-size: 1.25rem;
        }

        .auth-body {
            padding: 1.5rem;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: var(--dark-color);
        }

        .form-control {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 1rem;
            transition: border-color 0.3s ease;
        }

        .form-control:focus {
            border-color: var(--primary-color);
            outline: none;
        }

        .btn {
            width: 100%;
            padding: 0.75rem;
            border-radius: 5px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-primary {
            background-color: var(--primary-color);
            color: white;
        }

        .btn-primary:hover {
            background-color: var(--secondary-color);
        }

        .error-message {
            color: var(--danger-color);
            margin-top: 1rem;
            text-align: center;
            font-size: 0.9rem;
            min-height: 1.2rem;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Responsive adjustments */
        @media (max-width: 576px) {
            .auth-header {
                padding: 1.25rem;
            }
            
            .auth-header .logo-icon {
                font-size: 1.75rem;
            }
            
            .auth-header h1 {
                font-size: 1.1rem;
            }
            
            .auth-body {
                padding: 1.25rem;
            }
            
            .form-control, .btn {
                padding: 0.65rem;
            }
        }

        @media (max-width: 400px) {
            .auth-header {
                padding: 1rem;
            }
            
            .auth-body {
                padding: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <i class="fas fa-chart-line logo-icon"></i>
                <h1>Trade World Admin</h1>
            </div>
            
            <div class="auth-body">
                <form id="loginForm">
                    <div class="form-group">
                        <label for="adminId">Admin ID</label>
                        <input type="text" id="adminId" class="form-control" placeholder="Enter your admin ID" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" class="form-control" placeholder="Enter your password" required>
                        <div class="password-toggle" style="position: relative;">
                            <i class="fas fa-eye" id="togglePassword" style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); cursor: pointer;"></i>
                        </div>
                    </div>
                    
                    <button type="submit" class="btn btn-primary" id="loginBtn">
                        <i class="fas fa-sign-in-alt"></i> <span id="btnText">Login</span>
                    </button>
                    
                    <div id="authError" class="error-message"></div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script>
        // Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyBshAGZScyo7PJegLHMzORbkkrCLGD6U5s",
            authDomain: "mywebsite-600d3.firebaseapp.com",
            databaseURL: "https://mywebsite-600d3-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "mywebsite-600d3",
            storageBucket: "mywebsite-600d3.appspot.com",
            messagingSenderId: "584485288598",
            appId: "1:584485288598:web:01856eaa18ba5ada49e0b7",
            measurementId: "G-GQ9J9QH42J"
        };

        // Initialize Firebase
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }

        const auth = firebase.auth();
        const database = firebase.database();

        // Admin credentials (for fallback)
        const ADMIN_CREDENTIALS = {
            email: "admin@tradeworld.com",
            password: "Admin@1234"
        };

        document.addEventListener('DOMContentLoaded', function() {
            const loginForm = document.getElementById('loginForm');
            const authError = document.getElementById('authError');
            const loginBtn = document.getElementById('loginBtn');
            const btnText = document.getElementById('btnText');
            const togglePassword = document.getElementById('togglePassword');
            const passwordInput = document.getElementById('password');
            
            // Toggle password visibility
            togglePassword.addEventListener('click', function() {
                const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                passwordInput.setAttribute('type', type);
                this.classList.toggle('fa-eye-slash');
            });
            
            // Check if user is already logged in
            auth.onAuthStateChanged((user) => {
                if (user) {
                    // Verify admin status before redirecting
                    verifyAdminStatus(user.uid);
                }
            });
            
            // Login form submission
            loginForm.addEventListener('submit', function(e) {
                e.preventDefault();
                
                const email = document.getElementById('adminId').value.trim();
                const password = document.getElementById('password').value;
                
                authError.textContent = '';
                loginBtn.disabled = true;
                btnText.textContent = '';
                loginBtn.innerHTML = '<div class="loading"></div>';
                
                // Sign in with email and password
                auth.signInWithEmailAndPassword(email, password)
                    .then((userCredential) => {
                        // Check admin privileges
                        verifyAdminStatus(userCredential.user.uid);
                    })
                    .catch((error) => {
                        handleLoginError(error);
                    });
            });
            
            // Verify admin status
            function verifyAdminStatus(userId) {
                database.ref('admins/' + userId).once('value')
                    .then((snapshot) => {
                        if (snapshot.exists()) {
                            // Store authentication status
                            localStorage.setItem('adminAuthenticated', 'true');
                            localStorage.setItem('adminId', userId);
                            // Redirect to dashboard
                            window.location.href = 'dashboard.html';
                        } else {
                            // Not an admin - sign out
                            auth.signOut();
                            showError('You do not have admin privileges');
                            resetLoginButton();
                        }
                    })
                    .catch((error) => {
                        showError('Error verifying admin privileges');
                        resetLoginButton();
                    });
            }
            
            // Handle login errors
            function handleLoginError(error) {
                console.error("Login error:", error);
                let errorMessage = "Login failed. Please try again.";
                
                switch(error.code) {
                    case 'auth/invalid-email':
                        errorMessage = "Invalid email format";
                        break;
                    case 'auth/user-disabled':
                        errorMessage = "This account has been disabled";
                        break;
                    case 'auth/user-not-found':
                    case 'auth/wrong-password':
                        errorMessage = "Invalid email or password";
                        break;
                    case 'auth/too-many-requests':
                        errorMessage = "Too many attempts. Try again later";
                        break;
                    case 'auth/network-request-failed':
                        errorMessage = "Network error. Check your connection";
                        break;
                }
                
                showError(errorMessage);
                resetLoginButton();
            }
            
            // Show error message
            function showError(message) {
                authError.textContent = message;
            }
            
            // Reset login button state
            function resetLoginButton() {
                loginBtn.disabled = false;
                btnText.textContent = 'Login';
                loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> <span id="btnText">Login</span>';
            }
            
            // Fallback admin login (for development/testing)
            function fallbackAdminLogin() {
                document.getElementById('adminId').value = ADMIN_CREDENTIALS.email;
                document.getElementById('password').value = ADMIN_CREDENTIALS.password;
                loginForm.dispatchEvent(new Event('submit'));
            }
            
            // Uncomment for development testing only:
            // fallbackAdminLogin();
        });
    </script>
</body>
</html>
