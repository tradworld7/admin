<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trade World - User Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* (Include all CSS styles from dashboard.html here) */
        /* ... */
    </style>
</head>
<body>
    <!-- (Include header and sidebar from dashboard.html) -->
    <!-- ... -->

    <main class="main-content" id="mainContent">
        <div class="section-header">
            <h1 class="page-title">User Management</h1>
            <div class="user-search">
                <input type="text" id="userSearch" placeholder="Search by user ID or email...">
                <button id="searchBtn" class="btn btn-primary">
                    <i class="fas fa-search"></i> Search
                </button>
            </div>
        </div>
        
        <div class="user-actions">
            <button id="exportUsersBtn" class="btn btn-info">
                <i class="fas fa-file-export"></i> Export Users
            </button>
        </div>
        
        <div class="table-responsive">
            <table class="table users-table">
                <thead>
                    <tr>
                        <th>User ID</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Balance</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="usersTableBody">
                    <tr>
                        <td colspan="6" class="text-center">Loading users...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <!-- User Details Modal -->
    <div class="modal" id="userDetailsModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>User Details</h3>
                <button class="modal-close">&times;</button>
            </div>
            <div class="modal-body">
                <div class="user-details-grid">
                    <div class="detail-group">
                        <label>User ID:</label>
                        <span id="detailUserId"></span>
                    </div>
                    <div class="detail-group">
                        <label>Name:</label>
                        <span id="detailName"></span>
                    </div>
                    <div class="detail-group">
                        <label>Email:</label>
                        <span id="detailEmail"></span>
                    </div>
                    <div class="detail-group">
                        <label>Balance:</label>
                        <span id="detailBalance"></span>
                    </div>
                    <div class="detail-group">
                        <label>Registration:</label>
                        <span id="detailRegistration"></span>
                    </div>
                    <div class="detail-group">
                        <label>Status:</label>
                        <span id="detailStatus"></span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script>
        // (Include all JavaScript from dashboard.html here)
        // ...

        function loadUsersData() {
            database.ref('users').once('value').then(snapshot => {
                const tbody = document.getElementById('usersTableBody');
                tbody.innerHTML = '';
                
                if (!snapshot.exists()) {
                    tbody.innerHTML = '<tr><td colspan="6">No users found</td></tr>';
                    return;
                }

                snapshot.forEach(child => {
                    const user = child.val();
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td>${child.key}</td>
                        <td>${user.name || 'N/A'}</td>
                        <td>${user.email || 'N/A'}</td>
                        <td>$${(user.balance || 0).toFixed(2)}</td>
                        <td class="status-${user.status || 'active'}">${user.status || 'active'}</td>
                        <td>
                            <button class="btn btn-sm btn-primary view-user" data-userid="${child.key}">
                                <i class="fas fa-eye"></i> View
                            </button>
                        </td>
                    `;
                    tbody.appendChild(row);
                });

                // Add event listeners to view buttons
                document.querySelectorAll('.view-user').forEach(btn => {
                    btn.addEventListener('click', () => {
                        const userId = btn.dataset.userid;
                        database.ref('users/' + userId).once('value').then(snapshot => {
                            const user = snapshot.val();
                            document.getElementById('detailUserId').textContent = userId;
                            document.getElementById('detailName').textContent = user.name || 'N/A';
                            document.getElementById('detailEmail').textContent = user.email || 'N/A';
                            document.getElementById('detailBalance').textContent = `$${(user.balance || 0).toFixed(2)}`;
                            document.getElementById('detailRegistration').textContent = user.registrationDate ? formatDate(user.registrationDate) : 'N/A';
                            document.getElementById('detailStatus').textContent = user.status || 'active';
                            document.getElementById('userDetailsModal').classList.add('active');
                        });
                    });
                });
            });
        }

        // Initialize the page
        document.addEventListener('DOMContentLoaded', function() {
            if (!checkAdminAuth()) return;
            
            document.getElementById('adminName').textContent = ADMIN_CREDENTIALS.userId;
            
            // Load users data
            loadUsersData();
            
            // Search functionality
            document.getElementById('searchBtn').addEventListener('click', () => {
                const searchTerm = document.getElementById('userSearch').value.toLowerCase();
                const rows = document.querySelectorAll('#usersTableBody tr');
                
                rows.forEach(row => {
                    const text = row.textContent.toLowerCase();
                    row.style.display = text.includes(searchTerm) ? '' : 'none';
                });
            });
            
            // Export users
            document.getElementById('exportUsersBtn').addEventListener('click', exportUsers);
            
            // Logout
            document.querySelectorAll('#logoutBtn, #logoutLink').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.preventDefault();
                    localStorage.removeItem('adminAuthenticated');
                    window.location.href = 'index.html';
                });
            });
        });

        function exportUsers() {
            // Implementation for exporting users to CSV
            // ...
        }
    </script>
</body>
</html>
